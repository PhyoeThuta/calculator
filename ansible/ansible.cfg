[defaults]
# Disable host key checking for lab environment (enable in production)
host_key_checking = False

# Use SSH for connections
connection = ssh

# Set timeout for SSH connections
timeout = 30

# Enable retry files for debugging
retry_files_enabled = True
retry_files_save_path = ./

# Increase verbosity if needed (uncomment for debugging)
# verbosity = 2

[ssh_connection]
# Increase SSH timeout
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ConnectTimeout=20
pipelining = True